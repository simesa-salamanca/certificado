<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Certificado SIMESA</title>
<style>
  body {

    background: #f5f5f5;

    margin: auto;
    background: white;
    padding: 20px;
  }
  h1 {

    color: #555;
  }

    padding: 10px;
    background: #eee;
    margin-bottom: 5px;
  }
  .label {
    font-weight: bold;
  }
  input {
    border: none;
    background: transparent;
    width: 60%;
    text-align: right;
  }
</style>
</head>
<body>

  <h1 contenteditable="true">SIMESA</h1>
  <h2 contenteditable="true" style="text-align:center;">DANIEL VIVEROS AVILA</h2>

    <input value="EQ-4132-34 / 047 / 030326-MX / 002">
  </div>

  <div class="row">
    <div class="label">Emisión</div>
    <input value="03 marzo 2026">
  </div>

  <div class="row">
    <div class="label">Expira</div>
    <input value="02 marzo 2027">
  </div>

  <div class="row">

    <input value="Manipulador Telescópico">
  </div>

  <div class="row">

  </div>

  <div class="row">

    <input value="8042">
  </div>

  <div class="row">

  </div>

  <div class="row">

  <p contenteditable="true" style="text-align:center; margin-top:20px;">
    Verificación realizada correctamente
  </p>
</div>

</body>
</html>
